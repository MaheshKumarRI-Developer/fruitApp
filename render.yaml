services:
  # 1. Embedding Model Service (FastAPI) — Deploy separately (e.g., HuggingFace Spaces)
  # - type: web
  #   name: fruitapp-embedding
  #   env: docker
  #   dockerfilePath: embedding_model/Dockerfile
  #   dockerContext: embedding_model

  # 2. Backend API Service (Express)
  - type: web
    name: fruitapp-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 5000
      - key: EMBEDDING_SERVICE_URL
        value: http://fruitapp-embedding:8000/embed # Render internal networking URL
      # You must add GROQ_API_KEY, GROQ_MODEL, QDRANT_URL, INGEST_SECRET in Render's dashboard.

  # 3. Frontend Web Service (React + Vite + Nginx via Docker)
  - type: web
    name: fruitapp-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    envVars:
      - key: VITE_API_URL
        value: https://fruitapp-backend.onrender.com # Replace with your backend's actual public URL after deployment

