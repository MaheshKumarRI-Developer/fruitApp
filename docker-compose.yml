services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fruitapp-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  embedding_model:
    build: ./embedding_model
    container_name: fruitapp-embedding
    ports:
      - "8000:8000"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fruitapp-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_SERVICE_URL=http://embedding_model:8000/embed
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant
      - embedding_model
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: fruitapp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
